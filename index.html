<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OM TELECOM PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

header{
text-align:center;
padding:20px;
}

h1{color:#38bdf8}

.card{
background:#0f172a;
padding:15px;
margin:10px;
border-radius:15px;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#38bdf8;
color:white;
font-weight:bold;
cursor:pointer;
}

img{
width:100%;
border-radius:10px;
}

/* Chat */
.chat{
position:fixed;
bottom:10px;
right:10px;
background:#0f172a;
padding:10px;
border-radius:10px;
width:250px;
}
</style>
</head>

<body>

<header>
<h1>OM TELECOM</h1>
<p>Owner: Suraj | Giridih</p>
</header>

<div class="card">
<h2>📸 Shop</h2>
<img src="shop.jpg">
</div>

<div class="card">
<h2>📱 Booking</h2>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">

<select id="service">
<option value="1500">Display Repair (₹1500)</option>
<option value="4000">Motherboard Repair (₹4000-5000)</option>
<option value="200">Charging Pin (₹100-200)</option>
<option value="500">CC Board (₹500-700)</option>
</select>

<button onclick="sendWhatsApp()">Book Now</button>
</div>

<div class="card">
<h2>💳 Payment</h2>
<img src="qr.png">
<button onclick="pay()">Pay via UPI</button>
</div>

<div class="card">
<h2>🧾 Generate Bill</h2>
<input id="bname" placeholder="Customer Name">

<select id="bservice">
<option value="1500">Display Repair</option>
<option value="4500">Motherboard Repair</option>
<option value="150">Charging Pin</option>
<option value="600">CC Board</option>
</select>

<button onclick="generateBill()">Generate + Download PDF</button>

<div id="billBox" style="background:white;color:black;padding:10px;margin-top:10px;display:none"></div>
</div>

<!-- Chatbot -->
<div class="chat">
<b>🤖 Chat</b><br>
<input id="msg" placeholder="Ask...">
<button onclick="chat()">Send</button>
<p id="reply"></p>
</div>

<script>

function sendWhatsApp(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let service=document.getElementById("service").selectedOptions[0].text;

let msg=`Hello OM TELECOM%0AName:${name}%0APhone:${phone}%0AService:${service}`;
window.open("https://wa.me/918210329716?text="+msg);
}

function pay(){
window.location.href="upi://pay?pa=9708506701@upi&pn=Suraj&cu=INR";
}

function generateBill(){
let name=document.getElementById("bname").value;
let service=document.getElementById("bservice").selectedOptions[0].text;
let amount=document.getElementById("bservice").value;

let billHTML=`
<h3>OM TELECOM</h3>
<p>Name: ${name}</p>
<p>Service: ${service}</p>
<p>Amount: ₹${amount}</p>
<p style="color:green;">✔ Paid</p>
`;

document.getElementById("billBox").innerHTML=billHTML;
document.getElementById("billBox").style.display="block";

// PDF
const { jsPDF } = window.jspdf;
let doc = new jsPDF();

doc.text("OM TELECOM", 20, 20);
doc.text("Customer: "+name, 20, 40);
doc.text("Service: "+service, 20, 60);
doc.text("Amount: ₹"+amount, 20, 80);
doc.text("Thank You!", 20, 100);

doc.save("OM_TELECOM_Bill.pdf");
}

function chat(){
let m=document.getElementById("msg").value.toLowerCase();
let r="";

if(m.includes("price")) r="Display ₹1500, Motherboard ₹4000-5000, Charging ₹100-200, CC Board ₹500-700";
else if(m.includes("location")) r="Giridih Jharkhand";
else if(m.includes("time")) r="1-2 hours";
else r="More info ke liye shop visit kare 👍";

document.getElementById("reply").innerText=r;
}

</script>

</body>
</html>
